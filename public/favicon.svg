<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a2b"/>
      <stop offset="100%" stop-color="#1c7c93"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bw)"/>
  <!-- Stylized B: two stacked rounded humps reading both as a B and a signal/wave -->
  <path
    d="M20 16 H34 a8 8 0 0 1 0 16 H20 Z M20 32 H36 a8 8 0 0 1 0 16 H20 Z"
    fill="#fff"
  />
  <!-- Vertical spine of the B -->
  <rect x="16" y="14" width="6" height="36" rx="3" fill="#fff"/>
  <!-- Wire pulse dot -->
  <circle cx="48" cy="20" r="3" fill="#fff" opacity="0.95"/>
</svg>
