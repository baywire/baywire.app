name: Scrape Baywire

# Daily Baywire scrape, one matrix job per source. Each job runs the full
# pipeline (fetch → reduce/structured → extract → DB write) directly on the
# runner — no Vercel hop. Slugs MUST stay in sync with ADAPTERS in
# src/lib/scrapers/index.ts.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Optional source slug. Leave blank to run every adapter in parallel."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  source-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set source matrix
        id: set
        env:
          PICK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source || '' }}
        run: |
          # Keep in sync with ADAPTERS in src/lib/scrapers/index.ts.
          all='["eventbrite","visit_tampa_bay","visit_st_pete_clearwater","tampa_bay_times","tampa_bay_markets","tampa_gov","safety_harbor","ilovetheburg","thats_so_tampa"]'
          if [ -n "${PICK// }" ]; then
            sub=$(jq -n --arg s "$PICK" '[$s]')
            echo "matrix={\"source\":$sub}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"source\":$all}" >> "$GITHUB_OUTPUT"
          fi

  scrape:
    needs: source-matrix
    name: "Scrape ${{ matrix.source }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.source-matrix.outputs.matrix) }}
    concurrency:
      group: baywire-scrape-${{ matrix.source }}
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_EXTRACT_MODEL: ${{ secrets.OPENAI_EXTRACT_MODEL }}
      SCRAPE_DEBUG: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scrape
        id: scrape
        run: |
          set +e
          npm run scrape:local -- "${{ matrix.source }}" 2>&1 | tee scrape.log
          status=${PIPESTATUS[0]}
          set -e
          result=$(grep -E '^\[scrape:result\] ' scrape.log | tail -1 | sed 's/^\[scrape:result\] //') || true
          if [ -z "$result" ]; then
            result='{"slug":"${{ matrix.source }}","ok":false,"error":"no [scrape:result] line emitted","seen":0,"inserted":0,"updated":0,"skipped":0,"durationMs":0}'
          fi
          {
            echo "## Scrape \`${{ matrix.source }}\`"
            echo ""
            ok=$(echo "$result" | jq -r '.ok')
            seen=$(echo "$result" | jq -r '.seen')
            inserted=$(echo "$result" | jq -r '.inserted')
            updated=$(echo "$result" | jq -r '.updated')
            skipped=$(echo "$result" | jq -r '.skipped')
            duration=$(echo "$result" | jq -r '.durationMs')
            err=$(echo "$result" | jq -r '.error // empty')
            if [ "$ok" = "true" ]; then
              echo "Status: ok"
            else
              echo "Status: error"
              if [ -n "$err" ]; then
                echo ""
                echo "\`\`\`"
                echo "$err"
                echo "\`\`\`"
              fi
            fi
            echo ""
            echo "| seen | inserted | updated | skipped | duration |"
            echo "| ---- | -------- | ------- | ------- | -------- |"
            echo "| $seen | $inserted | $updated | $skipped | ${duration}ms |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ matrix.source }}-debug
          path: |
            scrape.log
            scripts/.last-html/
          if-no-files-found: ignore
          retention-days: 7
