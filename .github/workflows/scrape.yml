name: Scrape Baywire

# Daily Baywire scrape, one matrix job per source. Each job runs the full
# pipeline (fetch → reduce/structured → extract → DB write) directly on the
# runner — no Vercel hop. Slugs MUST stay in sync with ADAPTERS in
# src/lib/scrapers/index.ts.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Optional source slug. Leave blank to run every adapter in parallel."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  source-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set source matrix
        id: set
        env:
          PICK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source || '' }}
        run: |
          # Keep in sync with ADAPTERS in src/lib/scrapers/index.ts.
          all='["eventbrite","ticketmaster","visit_tampa_bay","visit_st_pete_clearwater","tampa_bay_times","tampa_bay_markets","tampa_gov","safety_harbor","ilovetheburg","thats_so_tampa","thats_so_tampa_places","ilovetheburg_places","visit_tampa_bay_places"]'
          if [ -n "${PICK// }" ]; then
            sub=$(jq -n --arg s "$PICK" '[$s]')
            echo "matrix={\"source\":$sub}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"source\":$all}" >> "$GITHUB_OUTPUT"
          fi

  scrape:
    needs: source-matrix
    name: "Scrape ${{ matrix.source }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.source-matrix.outputs.matrix) }}
    concurrency:
      group: baywire-scrape-${{ matrix.source }}
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_EXTRACT_MODEL: ${{ secrets.OPENAI_EXTRACT_MODEL }}
      TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
      SCRAPE_DEBUG: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Print runtime info
        run: |
          echo "Source: ${{ matrix.source }}"
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Runner: $RUNNER_OS / $RUNNER_ARCH"
          echo "Outbound IP: $(curl -s --max-time 5 https://api.ipify.org || echo unknown)"
          echo "SCRAPE_DEBUG: ${SCRAPE_DEBUG:-0}"

      - name: Install dependencies
        run: npm ci

      - name: Check source enabled
        id: enabled
        env:
          SOURCE: ${{ matrix.source }}
          MANUAL_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != '' }}
        run: |
          if [ "$MANUAL_OVERRIDE" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual_override" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node --input-type=module <<'EOF'
          import { PrismaClient } from "./src/generated/prisma/client";

          const source = process.env.SOURCE;
          const prisma = new PrismaClient();
          try {
            const row = await prisma.source.findUnique({
              where: { slug: source },
              select: { enabled: true },
            });
            const shouldRun = row?.enabled !== false;
            const output = process.env.GITHUB_OUTPUT;
            if (!output) throw new Error("GITHUB_OUTPUT is not set");
            const fs = await import("node:fs/promises");
            await fs.appendFile(output, `should_run=${shouldRun}\n`);
            await fs.appendFile(output, `reason=${shouldRun ? "enabled_or_missing" : "disabled"}\n`);
          } finally {
            await prisma.$disconnect();
          }
          EOF

      - name: Run scrape
        id: scrape
        if: steps.enabled.outputs.should_run == 'true'
        run: |
          set +e
          npm run scrape:local -- "${{ matrix.source }}" 2>&1 | tee scrape.log
          status=${PIPESTATUS[0]}
          set -e
          result=$(grep -E '^\[scrape:result\] ' scrape.log | tail -1 | sed 's/^\[scrape:result\] //') || true
          if [ -z "$result" ]; then
            result='{"slug":"${{ matrix.source }}","ok":false,"error":"no [scrape:result] line emitted","seen":0,"inserted":0,"updated":0,"skipped":0,"durationMs":0,"structuredHits":0}'
          fi
          {
            echo "## Scrape \`${{ matrix.source }}\`"
            echo ""
            ok=$(echo "$result" | jq -r '.ok')
            seen=$(echo "$result" | jq -r '.seen')
            inserted=$(echo "$result" | jq -r '.inserted')
            updated=$(echo "$result" | jq -r '.updated')
            skipped=$(echo "$result" | jq -r '.skipped')
            structured=$(echo "$result" | jq -r '.structuredHits // 0')
            duration=$(echo "$result" | jq -r '.durationMs')
            err=$(echo "$result" | jq -r '.error // empty')
            if [ "$ok" = "true" ]; then
              echo "Status: ok"
            else
              echo "Status: error"
              if [ -n "$err" ]; then
                echo ""
                echo "\`\`\`"
                echo "$err"
                echo "\`\`\`"
              fi
            fi
            echo ""
            echo "| seen | inserted | updated | skipped | structured | duration |"
            echo "| ---- | -------- | ------- | ------- | ---------- | -------- |"
            echo "| $seen | $inserted | $updated | $skipped | $structured | ${duration}ms |"
            echo ""
            echo "<details><summary>Fetch breakdown ($(grep -c '^\[fetch\]' scrape.log) requests)</summary>"
            echo ""
            echo "\`\`\`"
            grep -E '^\[fetch\]' scrape.log | tail -50 || true
            echo "\`\`\`"
            echo ""
            echo "</details>"
            non_200=$(grep -E '^\[fetch\] .* status=[0-9]+' scrape.log | grep -vE 'status=2[0-9]{2}' || true)
            if [ -n "$non_200" ]; then
              echo ""
              echo "<details open><summary>Non-2xx responses</summary>"
              echo ""
              echo "\`\`\`"
              echo "$non_200"
              echo "\`\`\`"
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Skip disabled source
        if: steps.enabled.outputs.should_run != 'true'
        run: |
          {
            echo "## Scrape \`${{ matrix.source }}\`"
            echo ""
            echo "Status: skipped (source disabled)"
            echo ""
            echo "Reason: ${{ steps.enabled.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scrape log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ matrix.source }}-log
          path: scrape.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ matrix.source }}-debug
          path: |
            scripts/.last-html/
          if-no-files-found: ignore
          retention-days: 14
